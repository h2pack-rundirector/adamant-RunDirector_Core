[config]
schemaVersion = "0.0.1"


[package]
namespace = "adamant"
name = "RunDirector_Core"
versionNumber = "1.0.0"
description = "Run Director modpack coordinator."
websiteUrl = "https://github.com/h2pack-rundirector/adamant-RunDirector_Core"
containsNsfwContent = false

[package.dependencies]
Hell2Modding-Hell2Modding = "1.0.78"
LuaENVY-ENVY = "1.2.0"
SGG_Modding-Chalk = "2.1.1"
SGG_Modding-ReLoad = "1.0.2"
SGG_Modding-ModUtil = "4.0.1"
adamant-ModpackLib = "1.0.0"
adamant-ModpackFramework = "1.0.0"

# -- submodules-start --
adamant-RunDirector_BiomeControl = "0.0.1"
adamant-RunDirector_BoonBans = "0.0.1"
adamant-RunDirector_GodPool = "0.0.1"
# -- submodules-end --

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "./CHANGELOG.md"
target = "./CHANGELOG.md"

[[build.copy]]
source = "./LICENSE"
target = "./LICENSE"

[[build.copy]]
source = "./src"
target = "./plugins"


[publish]
repository = "https://thunderstore.io"
communities = [ "hades-ii", ]

[publish.categories]
hades-ii = [ "mods", ]
